<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><title>Painel Admin - Editar Conta</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121214; color: #fff; max-width: 450px; margin: 40px auto; padding: 20px; }
        h1 { color: #04d361; text-align: center; }
        .box { background: #202024; padding: 25px; border-radius: 8px; }
        label { display: block; font-weight: bold; color: #a8a8b3; margin-top: 10px; font-size: 14px; }
        input { width: 100%; padding: 12px; background: #121214; border: 1px solid #29292e; border-radius: 4px; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #04d361; border: none; border-radius: 4px; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <h1>🛠️ Modificar Cadastro Master</h1>
    <div class="box">
        <form method="POST">
            <label>Nome:</label><input type="text" name="nome" value="{{ usuario.nome }}" required>
            <label>Sobrenome:</label><input type="text" name="sobrenome" value="{{ usuario.sobrenome }}" required>
            <label>E-mail de Acesso:</label><input type="email" name="email" value="{{ usuario.email }}" required>
            <label>Senha:</label><input type="text" name="senha" value="{{ usuario.senha }}" required>
            <label>CPF:</label><input type="text" name="cpf" value="{{ usuario.cpf }}" required>
            <label>Telefone:</label><input type="text" name="telefone" value="{{ usuario.telefone }}" required>
            {% if usuario.tipo == 'aluno' %}
                <label style="color: #04d361;">E-mail do Personal Responsável:</label>
                <input type="email" name="personal_vinculado" value="{{ usuario.personal_vinculado if usuario.personal_vinculado else '' }}">
            {% endif %}
            <button type="submit">💾 Gravar Alterações</button>
        </form>
        <p style="text-align: center;"><a href="/admin" style="color:#a8a8b3; text-decoration:none; font-size:14px;">Voltar</a></p>
    </div>
</body>
</html>
